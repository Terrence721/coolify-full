name: CodeQL

# Scoped to JavaScript/JSX only (resources/js/) — CodeQL has no PHP extractor,
# so it cannot analyze this app's Laravel backend. See psalm.yml for PHP-side
# taint analysis (SQL injection, XSS, etc.), CodeQL's closest equivalent for
# languages it doesn't support.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

jobs:
  analyze:
    name: Analyze (javascript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
