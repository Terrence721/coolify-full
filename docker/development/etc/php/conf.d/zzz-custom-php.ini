error_reporting = E_ERROR
error_log = /dev/stderr
log_errors = On
log_errors_max_len = 8192
ignore_repeated_errors = On
ignore_repeated_source = On

upload_max_filesize = 256M
post_max_size = 256M
memory_limit = ${PHP_MEMORY_LIMIT:-512M}

; Dev-mode OPcache: caches compiled PHP, but re-validates each file's mtime on
; every request, so code changes still take effect immediately (no manual
; cache clear needed) - see docs/command.md for why this dev environment's
; WSL2 bind-mount I/O tax makes the per-request savings worth it.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
